<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 360,
    height: 640,
    backgroundColor: '#ffffff',
    scene: { preload: preload, create: create, update: update }
};

let game = new Phaser.Game(config);
let drone, targetMarker, timerText, scoreText, mask, startBtn;
let timeLeft, score, isPlaying = false;
let currentDroneAngle, currentRelativeDir;

function preload() {
    // 預載音效 (此處使用瀏覽器合成音模擬)
}

function create() {
    // 1. 繪製背景網格 (教學用參考線)
    let graphics = this.add.graphics();
    graphics.lineStyle(1, 0xeeeeee);
    for(let i=0; i<640; i+=40) graphics.lineBetween(0,i,360,i);
    for(let i=0; i<360; i+=40) graphics.lineBetween(i,0,i,640);

    // 2. 建立新版無人機圖樣容器 (位於上半部)
    drone = this.add.container(180, 220);

    // --- 繪製無人機 (四方形與四角圓圈) ---
    const bodySize = 60; // 四方形機身大小
    const propRadius = 10; // 圓圈螺旋槳半徑
    const propOffset = bodySize / 2; // 圓圈相對於中心的偏移量

    // (A) 四方形機身
    let body = this.add.rectangle(0, 0, bodySize, bodySize, 0xecf0f1).setStrokeStyle(3, 0x2d3436);

    // (B) 機頭方向的兩個圓圈 (紅色)
    let propFL = this.add.circle(-propOffset, -propOffset, propRadius, 0xd63031).setStrokeStyle(2, 0x000000); // 前左
    let propFR = this.add.circle(propOffset, -propOffset, propRadius, 0xd63031).setStrokeStyle(2, 0x000000);  // 前右

    // (C) 機尾方向的兩個圓圈 (白色)
    let propBL = this.add.circle(-propOffset, propOffset, propRadius, 0xffffff).setStrokeStyle(2, 0x000000); // 後左
    let propBR = this.add.circle(propOffset, propOffset, propRadius, 0xffffff).setStrokeStyle(2, 0x000000);  // 後右

    // 將所有組件加入容器
    drone.add([body, propFL, propFR, propBL, propBR]);
    // ----------------------------------

    // 3. 目標紅點 (指引學員修正方向)
    targetMarker = this.add.circle(0, -100, 15, 0xff0000).setStrokeStyle(2, 0x000000);
    this.targetPivot = this.add.container(180, 220, [targetMarker]);

    // 4. 中文介面 (完全使用繁體中文)
    const textStyle = { fontSize: '26px', color: '#000', fontStyle: 'bold', fontFamily: '微軟正黑體' };
    timerText = this.add.text(20, 20, '時間：30', textStyle);
    scoreText = this.add.text(220, 20, '過關：0/20', textStyle);

    // 5. 虛擬搖桿區 (下半部，控制俯仰與橫滾)
    createButton(this, 180, 450, '前', 'up');
    createButton(this, 180, 560, '後', 'down');
    createButton(this, 80, 505, '左', 'left');
    createButton(this, 280, 505, '右', 'right');

    // 6. 初始白色蒙版與按鈕
    mask = this.add.rectangle(180, 320, 360, 640, 0xffffff, 0.95);
    startBtn = this.add.text(180, 320, '開始練習', { 
        fontSize: '40px', color: '#fff', backgroundColor: '#d63031', padding: 20, borderRadius: 10
    }).setOrigin(0.5).setInteractive();

    startBtn.on('pointerdown', () => startGame.call(this));
}

function createButton(scene, x, y, label, action) {
    let btn = scene.add.circle(x, y, 45, 0xecf0f1).setStrokeStyle(3, 0x2d3436).setInteractive();
    scene.add.text(x, y, label, { fontSize: '22px', color: '#2d3436', fontStyle: 'bold' }).setOrigin(0.5);
    
    btn.on('pointerdown', () => {
        btn.setFillStyle(0xbdc3c7);
        checkAnswer.call(scene, action);
    });
    btn.on('pointerup', () => btn.setFillStyle(0xecf0f1));
}

function startGame() {
    score = 0;
    timeLeft = 30;
    isPlaying = true;
    mask.setVisible(false);
    startBtn.setVisible(false);
    nextRound.call(this);
}

function nextRound() {
    if (score >= 20) return endGame.call(this, "訓練達成！");
    
    // 隨機無人機朝向 (0:北, 90:東, 180:南, 270:西)
    const angles = [0, 90, 180, 270];
    currentDroneAngle = angles[Math.floor(Math.random() * angles.length)];
    drone.setAngle(currentDroneAngle); // 視覺上旋轉無人機，學員看紅色圓圈判斷

    // 隨機目標相對位置 (相對於機頭方向：0:前, 90:右, 180:後, 270:左)
    const relativeAngles = [0, 90, 180, 270];
    currentRelativeDir = relativeAngles[Math.floor(Math.random() * relativeAngles.length)];
    
    // 計算絕對顯示角度 = 無人機角度 + 相對角度
    this.targetPivot.setAngle(currentDroneAngle + currentRelativeDir);
    
    scoreText.setText(`過關：${score}/20`);
}

function checkAnswer(input) {
    if (!isPlaying) return;

    let correct;
    if (currentRelativeDir === 0) correct = 'up';
    else if (currentRelativeDir === 90) correct = 'right';
    else if (currentRelativeDir === 180) correct = 'down';
    else if (currentRelativeDir === 270) correct = 'left';

    if (input === correct) {
        score++;
        // 此處可整合答對音效
        nextRound.call(this);
    } else {
        // 此處可整合答錯音效，並停留此關
        if (navigator.vibrate) navigator.vibrate(200);
        this.cameras.main.shake(100, 0.01);
    }
}

function update(time, delta) {
    if (isPlaying) {
        timeLeft -= delta / 1000;
        timerText.setText(`時間：${Math.max(0, Math.ceil(timeLeft))}`);
        if (timeLeft <= 0) endGame.call(this, "訓練超時！");
    }
}

function endGame(msg) {
    isPlaying = false;
    mask.setVisible(true);
    startBtn.setText(msg + "\n點擊重新開始").setVisible(true);
}
</script>
</body>
</html>

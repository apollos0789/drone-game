<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台續特訓中心</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: "微軟正黑體", sans-serif; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 360, height: 640,
    backgroundColor: '#ffffff',
    scene: { preload: preload, create: create, update: update }
};

let game = new Phaser.Game(config);
let currentScene = 'LOBBY'; 
let drone, emitter, isPlaying = false;
let lobbyUI, hoverMenuUI, backBtn, resultMask, startBtn, resultTitle;

const GAME_CENTER_Y = 220; 

let targetMarker, targetPivot, timeLeft, score, wrongCount = 0, currentRelativeDir;
let directionBtns = [];
let safeZone, hoverTime = 0, windX = 0, windY = 0, windTimer = 0;
let droneVelocityX = 0, droneVelocityY = 0, joystickVector = { x: 0, y: 0 };
let joystickBase, joystickThumb;

function preload() {}

function create() {
    const s = this;
    let bgG = s.add.graphics().lineStyle(1, 0xeeeeee);
    for(let i=0; i<640; i+=40) bgG.lineBetween(0,i,360,i);
    for(let i=0; i<360; i+=40) bgG.lineBetween(i,0,i,640);

    const pg = s.make.graphics({x:0,y:0,add:false}).fillStyle(0xffffff).fillRect(0,0,4,4);
    pg.generateTexture('p', 4, 4);
    emitter = s.add.particles(0,0,'p', { speed:{min:80,max:250}, scale:{start:1.5,end:0}, lifespan:700, tint:[0xd63031, 0x00b894], emitting:false });

    // --- 機體構造 ---
    drone = s.add.container(180, GAME_CENTER_Y).setVisible(false);
    const pO = 28, pR = 13;
    let fG = s.add.graphics().lineStyle(3, 0x2d3436);
    fG.lineBetween(-pO,-pO,pO,pO); fG.lineBetween(-pO,pO,pO,-pO);
    let cB = s.add.circle(0,0,14,0xf8f9fa).setStrokeStyle(3,0x2d3436);
    let pFL = s.add.circle(-pO,-pO,pR).setStrokeStyle(3,0xd63031);
    let pFR = s.add.circle(pO,-pO,pR).setStrokeStyle(3,0xd63031);
    
    // 絕對座標機頭 (10, -42)
    let head = s.add.triangle(10, -42, 0, -10, -10, 8, 10, 8, 0xd63031).setStrokeStyle(1, 0x000000);
    
    drone.add([fG, cB, pFL, pFR, 
               s.add.circle(-pO,pO,pR).setStrokeStyle(3,0xb2bec3), 
               s.add.circle(pO,pO,pR).setStrokeStyle(3,0xb2bec3), 
               head]);

    // 選單系統
    lobbyUI = s.add.container(0, 0);
    let titleText = s.add.text(180, 80, '台續特訓中心', {fontSize:'32px', color:'#2d3436', fontStyle:'bold'}).setOrigin(0.5);
    let card1 = s.add.rectangle(180, 230, 280, 120, 0xfdfdfd).setStrokeStyle(4, 0x2d3436).setInteractive();
    let card2 = s.add.rectangle(180, 380, 280, 120, 0xfdfdfd).setStrokeStyle(4, 0x2d3436).setInteractive();
    
    lobbyUI.add([titleText, card1, card2,
        s.add.text(180, 215, '🎯 方位識別特訓', {fontSize:'22px', color:'#2d3436', fontStyle:'bold'}).setOrigin(0.5),
        s.add.text(180, 245, '方向感基本功', {fontSize:'14px', color:'#636e72'}).setOrigin(0.5),
        s.add.text(180, 365, '🌪️ 姿態懸停特訓', {fontSize:'22px', color:'#2d3436', fontStyle:'bold'}).setOrigin(0.5),
        s.add.text(180, 395, '無人機版直線七秒', {fontSize:'14px', color:'#636e72'}).setOrigin(0.5)
    ]);

    card1.on('pointerdown', () => enterGame(s, 'DIRECTION'));
    card2.on('pointerdown', () => showHoverMenu(s));

    hoverMenuUI = s.add.container(0, 0).setVisible(false);
    let hTitle = s.add.text(180, 140, '選擇機頭朝向', {fontSize:'24px', color:'#2d3436', fontStyle:'bold'}).setOrigin(0.5);
    hoverMenuUI.add(hTitle);

    const menuCenterX = 180, menuCenterY = 320, btnSize = 90;
    const opts = [
        {l:'機頭朝前', a:0, x:0, y:-100, c:0xd63031},
        {l:'機頭朝後', a:180, x:0, y:100, c:0x00b894},
        {l:'機頭朝左', a:270, x:-100, y:0, c:0x2d3436},
        {l:'機頭朝右', a:90, x:100, y:0, c:0x2d3436},
        {l:'隨機', a:-1, x:0, y:0, c:0x636e72}
    ];

    opts.forEach(o => {
        let btn = s.add.rectangle(menuCenterX + o.x, menuCenterY + o.y, btnSize, btnSize, o.c, 0.1).setStrokeStyle(2, o.c).setInteractive();
        let txt = s.add.text(menuCenterX + o.x, menuCenterY + o.y, o.l, {fontSize:'15px', color:o.c, fontStyle:'bold'}).setOrigin(0.5);
        btn.on('pointerdown', () => {
            hoverMenuUI.setVisible(false);
            let finalAngle = o.a === -1 ? [0,90,180,270][Math.floor(Math.random()*4)] : o.a;
            startHoverGame(s, finalAngle);
        });
        hoverMenuUI.add([btn, txt]);
    });

    backBtn = s.add.text(15, 20, '↩ 返回', {fontSize:'14px', color:'#fff', backgroundColor:'#2d3436', padding:8}).setInteractive().setVisible(false);
    backBtn.on('pointerdown', () => location.reload());

    this.timerText = s.add.text(345, 20, '', {fontSize:'22px', color:'#2d3436', fontStyle:'bold'}).setOrigin(1, 0).setVisible(false);
    this.scoreText = s.add.text(345, 52, '', {fontSize:'16px', color:'#636e72', fontStyle:'bold'}).setOrigin(1, 0).setVisible(false);

    targetMarker = s.add.container(0, -95); 
    targetMarker.add([s.add.graphics().lineStyle(4, 0xd63031).strokeRoundedRect(-20,-20,40,40,8), s.add.circle(0,0,4,0xd63031,0.5)]);
    targetPivot = s.add.container(180, GAME_CENTER_Y, [targetMarker]).setVisible(false);
    safeZone = s.add.circle(180, GAME_CENTER_Y, 70).setStrokeStyle(3, 0xb2bec3).setVisible(false);
    
    createDirectionButtons(s);
    createHoverControls(s);

    resultMask = s.add.rectangle(180, 320, 360, 640, 0xffffff, 0.9).setVisible(false);
    resultTitle = s.add.text(180, 250, '', {fontSize:'24px', color:'#2d3436', fontStyle:'bold', align:'center'}).setOrigin(0.5).setVisible(false);
    startBtn = s.add.text(180, 380, '再次訓練', {fontSize:'24px', color:'#fff', backgroundColor:'#d63031', padding:15}).setOrigin(0.5).setInteractive().setVisible(false);
    startBtn.on('pointerdown', () => { resultMask.setVisible(false); resultTitle.setVisible(false); startBtn.setVisible(false); enterGame(s, currentScene); });
}

function showHoverMenu(s) {
    lobbyUI.setVisible(false);
    hoverMenuUI.setVisible(true);
    backBtn.setVisible(true);
}

function startHoverGame(s, angle) {
    currentScene = 'HOVER'; isPlaying = true;
    drone.setVisible(true).setPosition(180, GAME_CENTER_Y).setAngle(angle);
    s.timerText.setVisible(true); s.scoreText.setVisible(true);
    hoverTime = 0; windTimer = 0; droneVelocityX = 0; droneVelocityY = 0;
    safeZone.setVisible(true); targetPivot.setVisible(false);
    directionBtns.forEach(b => b.setVisible(false));
    joystickBase.setVisible(true); joystickThumb.setVisible(true);
    windX = (Math.random()-0.5)*1.2; windY = (Math.random()-0.5)*1.2;
}

function createDirectionButtons(s) {
    const bData = [{l:'前',a:'up',x:180,y:440},{l:'後',a:'down',x:180,y:550},{l:'左',a:'left',x:75,y:495},{l:'右',a:'right',x:285,y:495}];
    bData.forEach(b => {
        let c = s.add.circle(b.x, b.y, 45, 0xecf0f1).setStrokeStyle(3, 0x2d3436).setInteractive().setVisible(false);
        let t = s.add.text(b.x, b.y, b.l, {fontSize:'22px', color:'#2d3436', fontStyle:'bold'}).setOrigin(0.5).setVisible(false);
        c.on('pointerdown', () => { if(isPlaying && currentScene==='DIRECTION') checkDir(s, b.a); });
        directionBtns.push(c, t);
    });
}

function createHoverControls(s) {
    joystickBase = s.add.circle(180, 510, 55, 0xecf0f1).setStrokeStyle(4, 0x2d3436).setAlpha(0.6).setVisible(false);
    joystickThumb = s.add.circle(180, 510, 28, 0x2d3436).setAlpha(0.8).setInteractive().setVisible(false);
    s.input.setDraggable(joystickThumb);
    s.input.on('drag', (p, obj, dx, dy) => {
        if (!isPlaying || currentScene !== 'HOVER') return;
        let d = Phaser.Math.Distance.Between(180, 510, dx, dy);
        if (d <= 55) { obj.x = dx; obj.y = dy; }
        else { let a = Phaser.Math.Angle.Between(180, 510, dx, dy); obj.x = 180 + Math.cos(a)*55; obj.y = 510 + Math.sin(a)*55; }
        joystickVector = { x: (obj.x-180)/55, y: (obj.y-510)/55 };
    });
    s.input.on('dragend', (p, obj) => { s.tweens.add({targets:obj,x:180,y:510,duration:100}); joystickVector={x:0,y:0}; });
}

function enterGame(s, mode) {
    if(mode === 'HOVER') { showHoverMenu(s); return; }
    currentScene = mode; isPlaying = true;
    lobbyUI.setVisible(false); backBtn.setVisible(true);
    drone.setVisible(true).setPosition(180, GAME_CENTER_Y);
    s.timerText.setVisible(true); s.scoreText.setVisible(true);
    if(mode === 'DIRECTION') {
        score = 0; timeLeft = 30; wrongCount = 0; targetPivot.setVisible(true);
        directionBtns.forEach(b => b.setVisible(true));
        joystickBase.setVisible(false); joystickThumb.setVisible(false); safeZone.setVisible(false);
        nextDirRound();
    }
}

function nextDirRound() {
    const a = [0, 90, 180, 270];
    drone.setAngle(a[Math.floor(Math.random()*4)]);
    currentRelativeDir = a[Math.floor(Math.random()*4)];
    targetPivot.setAngle(drone.angle + currentRelativeDir);
}

function checkDir(s, input) {
    let correct = ['up', 'right', 'down', 'left'][currentRelativeDir / 90];
    if (input === correct) {
        score++; emitter.emitParticleAt(targetMarker.getWorldTransformMatrix().tx, targetMarker.getWorldTransformMatrix().ty, 15);
        if (score >= 20) endTraining(s, `特訓成功！\n最終錯誤：${wrongCount} 次`);
        else nextDirRound();
    } else {
        wrongCount++; timeLeft = Math.max(0, timeLeft - 1);
        let m1 = s.add.text(320, 20, '-1s', {fontSize:'24px', color:'#d63031', fontStyle:'bold'}).setOrigin(1,0);
        s.tweens.add({targets:m1, y:0, alpha:0, duration:800, onComplete:()=>m1.destroy()});
        s.cameras.main.shake(100, 0.01);
    }
}

// --- 核心修正：結束訓練時隱藏所有進行中元件 ---
function endTraining(s, msg) { 
    isPlaying = false; 
    
    // 隱藏核心物件
    drone.setVisible(false);
    safeZone.setVisible(false);
    targetPivot.setVisible(false);
    
    // 隱藏控制項
    joystickBase.setVisible(false);
    joystickThumb.setVisible(false);
    directionBtns.forEach(b => b.setVisible(false));
    
    // 隱藏即時資訊文字
    s.timerText.setVisible(false);
    s.scoreText.setVisible(false);

    // 顯示結算
    resultMask.setVisible(true); 
    resultTitle.setVisible(true).setText(msg); 
    startBtn.setVisible(true); 
}

function update(time, delta) {
    if (!isPlaying) return;
    if (currentScene === 'DIRECTION') {
        timeLeft -= delta/1000;
        this.timerText.setText(`剩餘：${Math.ceil(timeLeft)}s`);
        this.scoreText.setText(`進度：${score}/20`);
        if (timeLeft <= 0) endTraining(this, `時間到！\n答對 ${score} 題\n最終錯誤：${wrongCount} 次`);
    } else {
        windTimer += delta * 0.001;
        let tX = joystickVector.x*Math.cos(drone.rotation) - joystickVector.y*Math.sin(drone.rotation);
        let tY = joystickVector.x*Math.sin(drone.rotation) + joystickVector.y*Math.cos(drone.rotation);
        droneVelocityX += (windX + Math.sin(windTimer)*0.4 + tX*3.5)*0.02;
        droneVelocityY += (windY + Math.cos(windTimer*0.7)*0.4 + tY*3.5)*0.02;
        drone.x += (droneVelocityX *= 0.985); drone.y += (droneVelocityY *= 0.985);
        
        if (drone.x < 0 || drone.x > 360 || drone.y < 0 || drone.y > 640) endTraining(this, "機體失聯！\n飛出邊界");
        
        if (Phaser.Math.Distance.Between(drone.x, drone.y, 180, GAME_CENTER_Y) < 70) {
            safeZone.setStrokeStyle(5, 0x00b894); hoverTime += delta/1000;
        } else { safeZone.setStrokeStyle(3, 0xd63031); hoverTime = 0; }
        
        this.timerText.setText(`穩控：${hoverTime.toFixed(1)}s`);
        this.scoreText.setText(`目標：7.0s`);
        if (hoverTime >= 7) endTraining(this, "特訓成功！\n姿態極其穩定");
    }
}
//Made by 吳啓弘(小吳)
</script>
</body>
</html>
